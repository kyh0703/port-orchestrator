# main 머지 시 이미지를 한 번 빌드한다. 이게 유일한 build 지점(build once, promote many).
#
# 결과 태그:
#   ghcr.io/kyh0703/port-orchestrator:sha-<commit>  (immutable, staging/prod 승격의 원본)
#   ghcr.io/kyh0703/port-orchestrator:dev           (mutable, dev 가 항상 보는 태그 → ghcr 에 안 쌓임)
#
# dev 배포:
#   :dev 태그는 고정이라 그것만으론 ArgoCD 가 롤아웃을 안 한다(매니페스트 불변).
#   그래서 gitops(port-helm)의 envs/dev/orchestrator.yaml 의 podAnnotations.revision 을
#   이번 커밋 sha 로 갱신해 push → 매니페스트 변화 → dev(autosync) 자동 롤아웃 → :dev 재pull.
#   Image Updater 는 쓰지 않는다.
#
# 오래된 :sha-<commit> 는 cleanup-images.yml 이 주기적으로 정리한다.
name: build-dev

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write          # ghcr push 권한 (같은 owner 면 GITHUB_TOKEN 으로 충분)

env:
  REGISTRY: ghcr.io
  GITOPS_REPO: kyh0703/port-helm
  SERVICE: orchestrator                     # gitops envs/<env>/<SERVICE>.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # github.repository = kyh0703/port-orchestrator → 소문자로 이미지 경로 구성
      - id: img
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
            ${{ steps.img.outputs.name }}:dev
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: false

      # ---- dev 롤아웃 트리거: gitops repo 의 revision 을 갱신 ----
      # GITHUB_TOKEN 은 다른 repo 를 못 건드리므로 GITOPS_PAT 로 체크아웃
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: _gitops

      - name: install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # envs/dev/<svc>.yaml 의 podAnnotations.revision 한 줄만 갱신 → main 에 직접 push
      # (dev 는 autosync 라 PR 없이 바로 반영)
      - name: bump dev revision & push
        working-directory: _gitops
        env:
          REV: sha-${{ github.sha }}
        run: |
          FILE="gitops/envs/dev/${SERVICE}.yaml"
          yq -i '.podAnnotations.revision = strenv(REV)' "$FILE"

          git config user.name  "release-bot"
          git config user.email "release-bot@users.noreply.github.com"

          # revision 이 실제로 바뀐 경우에만 커밋 (재실행 등 no-op 방지)
          if git diff --quiet -- "$FILE"; then
            echo "revision unchanged — skip"
            exit 0
          fi
          git commit -am "dev: bump ${SERVICE} revision → ${REV}"
          git push origin main
