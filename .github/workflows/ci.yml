# PR 검증용. main 으로 가는 PR 마다 vet/build/test + 도커 빌드 확인.
# 이미지 push 는 안 한다(빌드가 깨지는지만 본다).
name: ci

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # gofmt 로 포맷 어긋난 파일이 있으면 실패
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needed on:"; echo "$out"; exit 1
          fi

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

      # 이미지가 실제로 빌드되는지만 확인 (push=false)
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: false
