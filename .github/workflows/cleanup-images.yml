# 오래된 :sha-<commit> 이미지를 주기적으로 정리한다(B1: build once, promote many + 청소).
#
# 보존: :dev, 버전태그(1.2.3 / 1.2.3-rc.1 등) 그리고 최근 KEEP 개의 :sha-*.
# 삭제: 그보다 오래된 :sha-* 만. (untagged 는 멀티아치 자식 매니페스트일 수 있어 건드리지 않음)
#
# 주의: user 소유 패키지 삭제는 GITHUB_TOKEN 으로 403 이 날 수 있다.
#       그 경우 delete:packages 스코프의 PAT 를 GHCR_CLEANUP_PAT 시크릿으로 넣으면 된다.
name: cleanup-images

on:
  schedule:
    - cron: "0 3 * * 0"     # 매주 일요일 03:00 UTC
  workflow_dispatch:         # 수동 실행도 허용

permissions:
  packages: write

env:
  OWNER: kyh0703
  PACKAGE: port-orchestrator
  KEEP: "20"                 # 최근 :sha-* 이미지 보존 개수

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: delete old sha-* and untagged versions
        env:
          GH_TOKEN: ${{ secrets.GHCR_CLEANUP_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # 전체 버전(페이지네이션) 수집: id / 생성시각 / 태그
          gh api --paginate \
            "/users/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100" \
            -q '.[] | {id, created: .created_at, tags: (.metadata.container.tags // [])}' \
            | jq -s '.' > versions.json

          # 삭제 후보: 태그가 전부 sha-* 인 버전만
          # → 최신순 정렬 후 KEEP 개는 남기고 나머지 id 만 추출
          jq -r --argjson keep "${KEEP}" '
            map(select((.tags | length) > 0 and (.tags | all(startswith("sha-")))))
            | sort_by(.created) | reverse
            | .[$keep:]
            | .[].id
          ' versions.json > to_delete.txt

          count=$(grep -c . to_delete.txt || true)
          echo "keeping newest ${KEEP} sha-* (+ dev/version tags); deleting ${count} old sha-* versions"

          while read -r id; do
            [ -z "$id" ] && continue
            gh api -X DELETE "/users/${OWNER}/packages/container/${PACKAGE}/versions/${id}"
            echo "deleted version ${id}"
          done < to_delete.txt
